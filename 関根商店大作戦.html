<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>関根商店大作戦</title>
<link href="./関根商店大作戦_files/css2" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html, body {
    height:100%; overflow:hidden;
    font-family:'Kosugi Maru', sans-serif;
    background:#0d1b2a;
    color:#fff;
  }
  #app { position:relative; width:100%; height:100vh; max-width:480px; margin:0 auto;
    background:linear-gradient(180deg,#bce6f5 0%, #8fd0ea 45%, #a9dcc0 60%, #5c9e78 100%);
    overflow:hidden; }

  .screen { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; }
  .screen.active { display:flex; }

  /* タイトル */
  #screen-title { justify-content:flex-start; padding-top:50px; }
  #screen-title .logo { width:78%; max-width:320px; filter:drop-shadow(0 8px 10px rgba(0,0,0,0.25)); }
  .title-buttons { margin-top:auto; margin-bottom:50px; display:flex; flex-direction:column; gap:14px; width:70%; }
  .tbtn {
    padding:15px; border:none; border-radius:18px; font-size:16px; font-weight:bold; cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,0.25); font-family:'Kosugi Maru', sans-serif;
  }
  .tbtn:active { transform:translateY(3px); box-shadow:none; }
  .tbtn.start { background:#2980b9; color:#fff; }
  .tbtn.rank  { background:#4ecb71; color:#fff; }
  .tbtn.help  { background:#fff; color:#2980b9; }
  .ver { position:absolute; top:8px; left:10px; font-size:10px; color:rgba(255,255,255,0.8); }

  /* パネル画面共通 */
  .panel-screen { justify-content:center; padding:20px; }
  .panel-box { background:#fff; border-radius:22px; padding:28px 22px; width:100%; max-width:340px; text-align:center; box-shadow:0 6px 0 #a8d4c8; color:#2c5040; }
  .panel-title { font-size:17px; font-weight:bold; color:#e8734a; margin-bottom:16px; }
  .name-input { width:100%; padding:13px; font-size:16px; border-radius:14px; border:2px solid #bfe3d8; text-align:center; margin-bottom:10px; color:#333; font-family:'Kosugi Maru', sans-serif; }
  .hint { font-size:11px; color:#8fada0; margin-bottom:16px; }
  .btn { padding:14px 20px; border:none; border-radius:16px; font-size:15px; font-weight:bold; cursor:pointer; width:100%;
    box-shadow:0 4px 0 rgba(0,0,0,0.2); margin-top:8px; font-family:'Kosugi Maru', sans-serif; }
  .btn:active { transform:translateY(3px); box-shadow:none; }
  .btn.primary { background:#2980b9; color:#fff; }
  .btn.confirm { background:#4ecb71; color:#fff; }
  .btn.ghost { background:transparent; color:#8fada0; box-shadow:none; font-size:12px; text-decoration:underline; margin-top:10px; }
  .help-body { text-align:left; font-size:14px; line-height:2; margin-bottom:6px; }

  /* プレイ画面 */
  #screen-play {
    justify-content:flex-start; padding-top:30px; position:relative;
    background-size:cover; background-position:center;
  }
  #screen-play::before {
    content:"";
    position:absolute; inset:0;
    background-image:var(--bg-image);
    background-size:cover; background-position:32% 15%;
    z-index:0;
  }
  #screen-play::after {
    content:"";
    position:absolute; inset:0;
    background:rgba(255,255,255,0.05);
    z-index:0;
  }
  #screen-play > * { position:relative; z-index:1; }
  #hudTop { display:flex; gap:14px; justify-content:center; margin-bottom:4px; }
  #hudTop { display:flex; gap:14px; margin-bottom:6px; }
  .hud-box { background:rgba(255,255,255,0.85); color:#2c5040; padding:8px 18px; border-radius:16px; font-size:15px; font-weight:bold; box-shadow:0 3px 0 rgba(0,0,0,0.1); }
  .hud-box .val { color:#e8734a; font-size:20px; }
  #timerBox { font-size:26px; font-weight:900; color:#fff; text-shadow:2px 2px 0 rgba(0,0,0,0.4); margin-bottom:10px; }
  #timerBox.warn { color:#ffe08a; animation:pulse 0.5s infinite; }
  @keyframes pulse { 0%,100%{ transform:scale(1); } 50%{ transform:scale(1.15); } }

  #brickArea { position:relative; width:240px; height:560px; margin-top:110px; display:flex; align-items:flex-start; justify-content:center; }
  #brick {
    width:240px; height:240px; cursor:pointer;
    background:none; border:none; box-shadow:none;
    display:flex; align-items:center; justify-content:center;
    transition: transform 0.05s;
    position:absolute; top:0; left:50%; transform:translateX(-50%);
  }
  #brick img { width:100%; height:100%; object-fit:contain; filter:drop-shadow(0 8px 10px rgba(0,0,0,0.3)); }
  #brick.hit { transform:translateX(-50%) scale(0.9); }
  #brick.shake { animation:shake 0.15s; }
  @keyframes shake {
    0%,100% { transform:translateX(-50%) translateX(0) rotate(0); }
    25% { transform:translateX(-50%) translateX(-4px) rotate(-3deg); }
    75% { transform:translateX(-50%) translateX(4px) rotate(3deg); }
  }
  #puncher {
    position:absolute; top:180px; left:50%;
    width:210px; transform:translateX(-50%);
    filter:drop-shadow(0 6px 8px rgba(0,0,0,0.3));
    pointer-events:none; z-index:4;
    transition: transform 0.09s;
  }
  #puncher.punch { transform:translateX(-50%) translateY(-34px); }

  .pop-item { position:absolute; width:104px; pointer-events:none; z-index:5; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.4)); }
  .pop-score { position:absolute; font-weight:900; font-size:26px; color:#fff; text-shadow:2px 2px 0 rgba(0,0,0,0.5), -1px -1px 0 rgba(0,0,0,0.5); pointer-events:none; z-index:6; }

  #tapHint { margin-top:36px; font-size:15px; color:#2c5040; background:rgba(255,255,255,0.9); padding:10px 20px; border-radius:16px; }

  .float-coin {
    position:absolute; width:88px; cursor:pointer; z-index:8;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,0.35));
  }

  /* 結果画面 */
  .result-icon { width:100px; margin-bottom:6px; }
  .result-title { font-size:22px; color:#e8734a; font-weight:bold; margin-bottom:14px; }
  .result-rows { text-align:left; margin:10px 0; }
  .result-row { display:flex; justify-content:space-between; padding:9px 4px; border-bottom:1px solid #eef7f4; font-size:15px; }
  .result-btns { display:flex; gap:10px; margin-top:16px; }

  /* ランキング */
  #screen-ranking { justify-content:flex-start; padding:20px 16px; }
  .rank-table { background:#fff; border-radius:18px; padding:12px; width:100%; max-width:340px; flex:1; overflow-y:auto; box-shadow:0 6px 0 #a8d4c8; }
  .rank-hdr, .rank-item { display:grid; grid-template-columns:34px 1fr 80px; font-size:13px; padding:8px 4px; align-items:center; color:#2c5040; }
  .rank-hdr { color:#8fada0; border-bottom:1px solid #dff3ee; padding-bottom:8px; font-weight:bold; }
  .rank-item { border-bottom:1px solid #eef7f4; }
  .rank-pos { font-weight:bold; }
  .rank-empty { text-align:center; color:#8fada0; font-size:12px; padding:30px 0; }
  .rank-bottom { margin-top:14px; width:100%; max-width:340px; }
</style>
</head>

const IMG = {};
for (const key in IMG_SRC) {
  const img = new Image();
  img.src = IMG_SRC[key];
  IMG[key] = img;
}

let playerName = localStorage.getItem('sekineDaisakusenName') || '';

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goToTitle(){ showScreen('screen-title'); }
function goToName(){
  document.getElementById('nameInput').value = playerName;
  showScreen('screen-name');
}
function showHelp(){ showScreen('screen-help'); }

function startGameFlow(){
  const v = document.getElementById('nameInput') ? document.getElementById('nameInput').value.trim() : playerName;
  playerName = v || 'ドライバー';
  localStorage.setItem('sekineDaisakusenName', playerName);
  startGame();
}

/* ============ ゲーム状態 ============ */
let game = null;
let timerInterval = null;
let floatSpawnTimeout = null;

function startGame(){
  document.querySelectorAll('.float-coin').forEach(el=>el.remove());
  game = { score:0, taps:0, timeLeft:15 };
  document.getElementById('hudScore').textContent = 0;
  document.getElementById('hudTaps').textContent = 0;
  document.getElementById('timerBox').textContent = 15;
  document.getElementById('timerBox').classList.remove('warn');
  showScreen('screen-play');

  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    game.timeLeft--;
    document.getElementById('timerBox').textContent = game.timeLeft;
    if(game.timeLeft <= 5){ document.getElementById('timerBox').classList.add('warn'); }
    if(game.timeLeft <= 0){
      clearInterval(timerInterval);
      clearTimeout(floatSpawnTimeout);
      endGame();
    }
  }, 1000);

  clearTimeout(floatSpawnTimeout);
  scheduleFloatSpawn();
}

function scheduleFloatSpawn(){
  const delay = 550 + Math.random()*500;
  floatSpawnTimeout = setTimeout(()=>{
    spawnFloatingCoin();
    if(game && game.timeLeft > 0){ scheduleFloatSpawn(); }
  }, delay);
}

function spawnFloatingCoin(){
  if(!game || game.timeLeft <= 0) return;
  const r = Math.random();
  let type;
  if(r < 0.02){ type='maneki'; }
  else if(r < 0.10){ type='gloves'; }
  else if(r < 0.40){ type='coinGold'; }
  else { type='coinIron'; }
  const points = { maneki:200, gloves:0, coinGold:30, coinIron:10 }[type];

  const playArea = document.getElementById('screen-play');
  const el = document.createElement('img');
  el.src = IMG[type].src;
  el.className = 'float-coin';
  const areaWidth = playArea.clientWidth || 320;
  const x = 24 + Math.random()*(areaWidth - 110);
  el.style.position = 'absolute';
  el.style.left = x + 'px';
  el.style.bottom = '20px';
  el.style.zIndex = '8';
  playArea.appendChild(el);

  let collected = false;
  function collect(){
    if(collected || !game) return;
    collected = true;
    if(type === 'gloves'){
      game.timeLeft += 2;
      document.getElementById('timerBox').textContent = game.timeLeft;
      if(game.timeLeft > 5){ document.getElementById('timerBox').classList.remove('warn'); }
    } else {
      game.score += points;
      document.getElementById('hudScore').textContent = game.score;
    }
    el.remove();
  }
  el.addEventListener('click', collect);
  el.addEventListener('touchstart', (e)=>{ e.preventDefault(); collect(); }, {passive:false});

  const duration = 3200;
  let t = 0;
  const startBottom = 20;
  const endBottom = (playArea.clientHeight || 700) - 120;
  const anim = setInterval(()=>{
    t += 16;
    const progress = t / duration;
    if(collected){ clearInterval(anim); return; }
    const bottom = startBottom + progress*(endBottom - startBottom);
    el.style.bottom = bottom + 'px';
    el.style.opacity = progress < 0.8 ? '1' : String(Math.max(0, 1 - (progress-0.8)/0.2));
    if(progress >= 1){
      clearInterval(anim);
      el.remove();
    }
  }, 16);
}

const brick = document.getElementById('brick');
const brickArea = document.getElementById('brickArea');

brickArea.style.cursor = 'pointer';
brickArea.addEventListener('click', onTap);
brickArea.addEventListener('touchstart', (e)=>{ e.preventDefault(); onTap(); }, {passive:false});

function onTap(){
  if(!game || game.timeLeft <= 0) return;
  game.taps++;
  document.getElementById('hudTaps').textContent = game.taps;

  brick.classList.remove('shake');
  void brick.offsetWidth;
  brick.classList.add('shake');

  const puncher = document.getElementById('puncher');
  puncher.classList.remove('punch');
  void puncher.offsetWidth;
  puncher.classList.add('punch');
  setTimeout(()=>puncher.classList.remove('punch'), 150);

  const r = Math.random();
  let type, points;
  if(r < 0.02){ type='maneki'; points=200; }
  else if(r < 0.12){ type='gloves'; points=0; }
  else if(r < 0.35){ type='coinGold'; points=30; }
  else { type='coinIron'; points=10; }

  if(type === 'gloves'){
    game.timeLeft += 2;
    document.getElementById('timerBox').textContent = game.timeLeft;
    if(game.timeLeft > 5){ document.getElementById('timerBox').classList.remove('warn'); }
  } else {
    game.score += points;
    document.getElementById('hudScore').textContent = game.score;
  }

  spawnPop(type, points);
}

function spawnPop(type, points){
  const img = document.createElement('img');
  img.src = IMG[type].src;
  img.className = 'pop-item';
  const startX = brickArea.offsetWidth/2 - 40 + (Math.random()*50-25);
  img.style.left = startX + 'px';
  img.style.top = '90px';
  img.style.opacity = '1';
  brickArea.appendChild(img);

  const scoreEl = document.createElement('div');
  scoreEl.className = 'pop-score';
  scoreEl.textContent = type === 'gloves' ? '+2秒' : ('+' + points);
  if(type === 'gloves'){ scoreEl.style.color = '#7fd97f'; }
  scoreEl.style.left = (startX + 12) + 'px';
  scoreEl.style.top = '140px';
  brickArea.appendChild(scoreEl);

  let t = 0;
  const anim = setInterval(()=>{
    t += 16;
    const progress = t / 800;
    const y = 90 - progress*130;
    img.style.top = y + 'px';
    scoreEl.style.top = (y+50) + 'px';
    img.style.opacity = String(Math.max(0, 1 - progress));
    scoreEl.style.opacity = String(Math.max(0, 1 - progress));
    if(progress >= 1){
      clearInterval(anim);
      img.remove();
      scoreEl.remove();
    }
  }, 16);
}

function endGame(){
  document.getElementById('resultScore').textContent = game.score;
  document.getElementById('resultTaps').textContent = game.taps + ' 回';

  saveRankingRecord({
    name: playerName || 'ドライバー',
    score: game.score,
    taps: game.taps,
    date: new Date().toISOString().slice(0,16).replace('T',' ')
  });

  showScreen('screen-result');
}

/* ============ ランキング ============ */
function loadRankings(){
  try{ return JSON.parse(localStorage.getItem('sekineDaisakusenRankings')) || []; }
  catch(e){ return []; }
}
function saveRankingRecord(rec){
  const list = loadRankings();
  list.push(rec);
  localStorage.setItem('sekineDaisakusenRankings', JSON.stringify(list));
}
function openRanking(){
  renderRankingList();
  showScreen('screen-ranking');
}
function renderRankingList(){
  const list = loadRankings();
  const listEl = document.getElementById('rankList');
  if(list.length===0){
    listEl.innerHTML = '<div class="rank-empty">まだ記録がありません。<br>プレイしてみよう！</div>';
    return;
  }
  const sorted = [...list].sort((a,b)=>b.score-a.score).slice(0,20);
  listEl.innerHTML = sorted.map((r,i)=>{
    const medal = i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
    return `<div class="rank-item">
      <span class="rank-pos">${medal}</span>
      <span>${escapeHtml(r.name)}</span>
      <span>${r.score}</span>
    </div>`;
  }).join('');
}
function escapeHtml(s){
  return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
